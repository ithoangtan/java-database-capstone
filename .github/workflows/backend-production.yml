# Backend build (compile + test). No DB config in code — use GitHub Variables/Secrets when deploying.
name: Backend (Production env)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  backend-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Verify with Maven
        working-directory: app
        run: mvn -B verify
