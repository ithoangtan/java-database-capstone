name: Compile Backend

on:
  push:
  pull_request:

jobs:
  compile-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile with Maven
        working-directory: app
        run: mvn clean compile
