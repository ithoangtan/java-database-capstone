# =============================================================================
# DB config: always from env (injected when run). Docker / production: set env.
# Local: optional env; if unset, defaults below are used.
# =============================================================================
spring.application.name=back-end

# DB — from env or inject at runtime (Docker, production, or local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cms?useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/prescriptions}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

management.endpoint.health.show-details=always
management.health.db.enabled=true

api.path=/
jwt.secret=${JWT_SECRET:$!@#$^%$$$%####$DDCPN0234FCFDPD8670M}

spring.web.resources.static-locations=classpath:/static/
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
