<!-- patientAppointment.html -->
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../assets/images/logo/logo.png" />
  <title>My Appointments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/adminDashboard.css">
  <link rel="stylesheet" href="../assets/css/doctorDashboard.css">
  <link rel="stylesheet" href="../assets/css/patientAppointments.css">
  <script src="../js/render.js" defer></script>
  <script src="../js/util.js" defer></script>
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/footer.js" defer></script>
  <script type="module" src="../js/patientAppointment.js" defer></script>
</head>

<body onload="renderContent()">
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>
      <main class="main-content patient-appointments-page">
        <h1 class="page-title">My Appointments</h1>
        <p class="page-subtitle">View and manage your scheduled appointments.</p>
        <div class="toolbar">
          <input type="text" id="searchBar" class="searchBar" placeholder="Search by doctor name..." />
          <div class="filter-wrapper">
            <select class="filter-select" id="appointmentFilter">
              <option value="allAppointments">All Appointments</option>
              <option value="future">Upcoming</option>
              <option value="past">Past</option>
            </select>
          </div>
        </div>
        <div class="table-card">
        <table id="patientTable">
          <thead class="table-header">
            <tr>
              <th>Patient</th>
              <th>Doctor</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="patientTableBody">
            <!-- rows will be inserted here dynamically -->
          </tbody>
        </table>
        </div>
      </main>
      <div id="footer"></div>
    </div>
  </div>
</body>
</html>
