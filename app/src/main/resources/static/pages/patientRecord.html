<!-- patientRecord.html -->
<!-- for doctor to see patient details -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/images/logo/logo.png" />
    <title>Patient Record</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/adminDashboard.css">
    <link rel="stylesheet" href="../assets/css/doctorDashboard.css">
    <script src = "../js/render.js" defer></script>
    <script src = "../js/util.js" defer></script>
    <script src = "../js/components/header.js" defer></script>
    <script src = "../js/components/footer.js" defer></script>
    <script type = "module" src = "../js/components/patientRecordRow.js" defer></script>
    <script type = "module" src = "../js/patientRecordServices.js" defer></script>
</head>
<body onload="renderContent()">
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>
            <main class="main-content">
                <h1 class="page-title">Patient Record</h1>
                <p class="page-subtitle">View appointment and prescription history for this patient.</p>
                <table id="patientTable" class="doctor-table">
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Appointment ID</th>
                      <th>Patient ID</th>
                      <th>Prescription</th>
                    </tr>
                  </thead>
                  <tbody id="patientTableBody"></tbody>
                </table>
            </main>
            <div id="footer"></div>
        </div>
    </div>

</body>  
</html>
